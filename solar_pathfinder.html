<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SCEnergy 패널 배치 설계</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏠</text></svg>"/>
<script src="https://unpkg.com/@turf/turf@7.1.0/turf.min.js"></script>
<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=__KAKAO_JS_KEY__&libraries=services&autoload=false" onerror="console.warn('Kakao SDK load failed, init will retry')"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0a0e1a;--pn:#0f1729;--ac:#06d6a0;--a2:#38bdf8;--tx:#e2e8f0;--dm:#64748b;--br:#f8fafc;--bd:rgba(148,163,184,0.15);--gl:rgba(15,23,42,0.8);}
html,body{height:100%;overflow:hidden;font-family:'Pretendard',system-ui,sans-serif;background:var(--bg);color:var(--tx);}
.ly{display:grid;grid-template-columns:360px 1fr;grid-template-rows:50px 1fr 34px;height:100vh;}
.hd{grid-column:1/-1;background:linear-gradient(135deg,rgba(6,214,160,0.08),rgba(56,189,248,0.06));border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 14px;gap:8px;}
.sd{grid-row:2;overflow-y:auto;background:var(--pn);border-right:1px solid var(--bd);padding:10px;display:flex;flex-direction:column;gap:8px;}
.mw{grid-row:2;position:relative;overflow:hidden;}
#kMap{width:100%;height:100%;}
#kMap.drawing,#kMap.drawing *{cursor:crosshair!important;}
.ft{grid-column:1/-1;background:var(--pn);border-top:1px solid var(--bd);display:flex;align-items:center;padding:0 14px;font-size:10px;color:var(--dm);gap:8px;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:rgba(100,116,139,0.3);border-radius:3px;}
.cd{background:linear-gradient(145deg,rgba(22,32,54,0.95),rgba(15,23,41,0.9));border:1px solid var(--bd);border-radius:10px;padding:10px;}
.cd h3{font-size:11px;font-weight:700;color:var(--ac);margin-bottom:6px;display:flex;align-items:center;gap:4px;}
.cd.off{opacity:0.4;pointer-events:none;}
.bt{display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:6px 12px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.15s;border:1px solid transparent;white-space:nowrap;}
.bp{background:linear-gradient(135deg,#06d6a0,#0ea5e9);color:#0f172a;}.bp:hover{transform:translateY(-1px);}
.bs{background:rgba(56,189,248,0.1);border-color:rgba(56,189,248,0.3);color:var(--a2);}
.bd2{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.3);color:#f87171;}
.bk{background:linear-gradient(135deg,#f59e0b,#f97316);color:#0f172a;font-weight:700;font-size:12px;}
.bt:disabled{opacity:0.3;pointer-events:none;}
.ip{width:100%;background:rgba(30,41,59,0.8);border:1px solid var(--bd);border-radius:6px;padding:5px 8px;font-size:11px;color:var(--tx);outline:none;}.ip:focus{border-color:var(--a2);}
.lb{display:block;font-size:9px;font-weight:700;color:var(--dm);margin-bottom:2px;text-transform:uppercase;}
.pu{animation:dp 1.5s ease-in-out infinite;}
@keyframes dp{0%,100%{box-shadow:0 0 0 0 rgba(6,214,160,0.4);}50%{box-shadow:0 0 0 8px rgba(6,214,160,0);}}
.bg{display:flex;flex-direction:column;align-items:center;padding:5px;border-radius:7px;background:rgba(30,41,59,0.6);border:1px solid var(--bd);min-width:50px;}.bg .v{font-size:16px;font-weight:800;color:var(--br);line-height:1;}.bg .l{font-size:8px;color:var(--dm);margin-top:1px;}
.sn{display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;border-radius:50%;background:rgba(6,214,160,0.2);color:var(--ac);font-size:9px;font-weight:800;margin-right:2px;}.sn.ok{background:var(--ac)!important;color:#0f172a!important;}
.ov{position:absolute;top:8px;right:8px;z-index:100;backdrop-filter:blur(16px);background:var(--gl);border:1px solid var(--bd);border-radius:9px;padding:8px 12px;display:flex;gap:8px;}
.di{position:absolute;bottom:8px;left:8px;z-index:100;background:var(--gl);backdrop-filter:blur(12px);border:1px solid var(--bd);border-radius:9px;padding:7px 11px;font-size:10px;color:var(--br);display:none;}.di .r{display:flex;gap:6px;}.di .vl{color:var(--ac);font-weight:700;}
.toast{position:fixed;top:58px;left:50%;transform:translateX(-50%);z-index:9999;padding:7px 18px;border-radius:9px;font-size:12px;font-weight:600;backdrop-filter:blur(16px);border:1px solid var(--bd);background:var(--gl);color:var(--br);opacity:0;transition:opacity 0.3s;pointer-events:none;}.toast.show{opacity:1;}
.zc{position:absolute;top:8px;left:8px;z-index:100;display:flex;flex-direction:column;gap:2px;opacity:0;transition:opacity 0.25s;pointer-events:none;}
.mw:hover .zc,.zc:hover{opacity:1;pointer-events:auto;}
.zc button{width:36px;height:36px;border-radius:8px;border:1px solid var(--bd);background:var(--gl);backdrop-filter:blur(12px);color:var(--br);font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.zc button:hover{background:rgba(6,214,160,0.15);}
.zc button.on{background:rgba(6,214,160,0.3);border-color:rgba(6,214,160,0.5);color:var(--ac);}
.zl{position:absolute;top:8px;left:50px;z-index:100;background:var(--gl);backdrop-filter:blur(12px);border:1px solid var(--bd);border-radius:7px;padding:4px 8px;font-size:10px;color:var(--br);font-weight:600;pointer-events:none;opacity:0.35;transition:opacity 0.25s;}
.mw:hover .zl{opacity:1;}
.mt{display:flex;border-radius:7px;overflow:hidden;border:1px solid var(--bd);}.mt button{flex:1;padding:6px 0;font-size:11px;font-weight:700;border:none;cursor:pointer;background:transparent;color:var(--dm);}.mt button.ar{background:rgba(236,72,153,0.2);color:#f472b6;border-bottom:2px solid #f472b6;}.mt button.al{background:rgba(34,197,94,0.2);color:#4ade80;border-bottom:2px solid #4ade80;}
.ml{background:rgba(0,0,0,0.85);color:#ff3b3b;font-size:12px;font-weight:800;padding:3px 8px;border-radius:4px;white-space:nowrap;border:1px solid rgba(255,59,59,0.6);pointer-events:none;text-shadow:0 0 4px rgba(255,0,0,0.3);}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="ly">
  <header class="hd">
    <span id="hI" style="font-size:14px;">🏠</span><span id="hT" style="font-size:13px;font-weight:800;">지붕 패널 배치</span>
    <div class="mt" style="width:140px;margin-left:6px;"><button id="mR" class="ar" onclick="setMode('roof')">🏠 지붕</button><button id="mL" onclick="setMode('land')">🌿 토지</button></div>
    <div style="flex:1;"></div>
    <input id="aS" class="ip" style="width:240px;font-size:12px;" placeholder="주소 검색" onkeydown="if(event.key==='Enter')sAddr()"/>
    <button class="bt bp" onclick="sAddr()">🔍</button>
    <div style="flex:1;"></div>
    <button class="bt bs" onclick="doCapture()">📸 캡쳐</button>
    <button class="bt bs" onclick="window.opener?window.close():history.back()">✕</button>
  </header>
  <aside class="sd">
    <div class="cd"><h3><span class="sn" id="s1">1</span><span id="s1L">지붕 선택</span></h3>
      <div id="sA" style="font-size:10px;color:var(--dm);margin-bottom:4px;">주소를 검색하세요</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;"><div><span class="lb">위도</span><input id="iLa" class="ip" type="number" step="0.0001"/></div><div><span class="lb">경도</span><input id="iLo" class="ip" type="number" step="0.0001"/></div></div>
      <button class="bt bs" style="width:100%;margin-top:4px;" onclick="goCo()">좌표 이동</button></div>
    <div class="cd"><h3><span class="sn" id="s2">2</span><span id="s2L">영역 그리기</span></h3>
      <div style="display:flex;gap:4px;"><button class="bt bp" id="bD" onclick="togDr()" style="flex:1;">🖊 그리기 시작</button><button class="bt bd2" onclick="clrAll()">초기화</button></div>
      <div id="dUI" style="display:none;margin-top:5px;"><div style="font-size:10px;color:var(--dm);">지도 클릭 = 꼭짓점 추가</div>
        <div style="font-size:11px;color:var(--ac);font-weight:700;margin-top:3px;" id="vC">꼭짓점: 0개</div>
        <div style="display:flex;gap:4px;margin-top:4px;"><button class="bt bk" id="bF" onclick="finPoly()" style="flex:1;" disabled>✅ 영역 완성</button><button class="bt bd2" onclick="undo()">↩</button></div></div>
      <div id="pI" style="font-size:10px;color:var(--ac);margin-top:3px;display:none;"></div></div>
    <div class="cd"><h3><span class="sn" id="s3">3</span>모듈 설정</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;">
        <div><span class="lb">가로(m)</span><input id="mW" class="ip" type="number" step="0.01" value="1.13"/></div>
        <div><span class="lb">세로(m)</span><input id="mH" class="ip" type="number" step="0.01" value="2.4"/></div>
        <div><span class="lb">출력(W)</span><input id="mP" class="ip" type="number" value="640"/></div>
        <div><span class="lb">경사(°)</span><input id="tD" class="ip" type="number" value="15"/></div>
        <div><span class="lb">열간격(m)</span><input id="rG" class="ip" type="number" step="0.1" min="0" value="0.8"/></div>
        <div><span class="lb">이격거리(m)</span><input id="sB" class="ip" type="number" step="0.1" min="0" value="0.5"/></div>
      </div>
      <div style="margin-top:3px;"><span class="lb">방향</span><select id="ori" class="ip"><option value="portrait">세로</option><option value="landscape">가로</option></select></div></div>
    <div class="cd off" id="c4"><h3><span class="sn" id="s4">4</span>패널 배치</h3>
      <button class="bt bp" onclick="autoLay()" style="width:100%;">⚡ 자동 배치</button>
      <div style="display:flex;gap:4px;margin-top:4px;"><button class="bt bs" id="bM" onclick="togMn()" style="flex:1;">+수동</button><button class="bt bs" onclick="rotM()">↻</button><button class="bt bd2" onclick="clrMod()">삭제</button></div>
      <div id="mnH" style="font-size:10px;color:var(--dm);margin-top:3px;display:none;">지도 클릭 = 모듈 1개</div></div>
    <div class="cd" id="stC" style="display:none;"><h3>📊 결과</h3>
      <div style="display:flex;gap:4px;flex-wrap:wrap;"><div class="bg"><span class="v" id="xP">0</span><span class="l">모듈</span></div><div class="bg"><span class="v" id="xC">0</span><span class="l">kW</span></div><div class="bg"><span class="v" id="xA">0</span><span class="l">m²</span></div><div class="bg"><span class="v" id="xD">0</span><span class="l">W/m²</span></div></div></div>
    <div class="cd off" id="c5"><h3><span class="sn" id="s5">5</span>연동</h3>
      <button class="bt bs" style="width:100%;" onclick="doCapture()">📸 리포트 캡쳐</button>
      <div id="capS" style="font-size:10px;color:var(--ac);margin-top:3px;display:none;"></div></div>
  </aside>
  <main class="mw">
    <div id="kMap"></div>
    <canvas id="pvCvs" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:2;"></canvas>
    <div class="zc">
      <button onclick="pgZoom(1)" id="pz1" class="on">1×</button>
      <button onclick="pgZoom(1.5)" id="pz15">1.5×</button>
      <button onclick="pgZoom(2)" id="pz2">2×</button>
      <button onclick="pgZoom(3)" id="pz3">3×</button>
      <button onclick="pgZoom(4)" id="pz4">4×</button>
      <button onclick="pgZoom(5)" id="pz5">5×</button>
    </div>
    <div class="zl" id="zL">1×</div>
    <div class="di" id="dO"><div class="r">가로:<span class="vl" id="dW">-</span></div><div class="r">세로:<span class="vl" id="dH">-</span></div><div class="r">면적:<span class="vl" id="dA">-</span></div><div class="r" id="dMR" style="display:none;">배치:<span class="vl" id="dMV">-</span></div></div>
    <div class="ov" id="pO" style="display:none;"><div class="bg" style="background:transparent;border:none;"><span class="v" id="oP" style="font-size:14px;">0</span><span class="l">모듈</span></div><div class="bg" style="background:transparent;border:none;"><span class="v" id="oC" style="font-size:14px;color:var(--ac);">0</span><span class="l">kW</span></div></div>
  </main>
  <footer class="ft"><span>SCEnergy 패널 배치</span><span style="flex:1;"></span><span id="fC">-</span><span style="margin-left:8px;" id="fZ">-</span></footer>
</div>
<script>
var BK=(function(){try{var q=new URLSearchParams(location.search),b=q.get("backend")||"";if(!b)return"";try{b=decodeURIComponent(b)}catch(e){}b=b.trim();var i=b.indexOf("/api/");if(i>-1)b=b.substring(0,i);while(b.endsWith("/"))b=b.slice(0,-1);return b}catch(e){return""}})();
var VWK="__VWORLD_TILE_KEY__";
var km=null,kR=false;
var dM=false,mM=false,pts=[],vOvs=[],dLn=null,measOvs=[],measLns=[],modRects=[];
// 다중 폴리곤 지원 (ㅅ지붕 양면 등)
var allPolys=[]; // [{pts:[{lat,lng},...], kakao:Polygon}]
var mods=[],rA=0,cAd="",cLa=37.5665,cLo=126.978,curMo="roof";
var pgZoomLv=1;

function $(id){return document.getElementById(id);}
function T(m,d){var t=$("toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove("show")},d||2500);}

// 지도 줌 — 카카오 네이티브 레벨 우선, level 1 이하는 CSS zoom 보조
var _baseMapLevel=null,_cssScale=1;
function pgZoom(z){
  pgZoomLv=z;_cssScale=1;
  if(!km)return;
  if(_baseMapLevel===null) _baseMapLevel=km.getLevel();
  var mapEl=$("kMap"),cvs=$("pvCvs");
  mapEl.style.transform="";mapEl.style.transformOrigin="";
  if(cvs){cvs.style.transform="";cvs.style.transformOrigin="";}

  if(z===1){
    km.setLevel(_baseMapLevel);
  }else{
    var levelDelta=Math.round(Math.log2(z));
    var targetLevel=_baseMapLevel-levelDelta;
    if(targetLevel>=1){
      km.setLevel(targetLevel);
    }else{
      km.setLevel(1);
      var nativeZoom=Math.pow(2,_baseMapLevel-1);
      var cssExtra=z/nativeZoom;
      if(cssExtra>1.1){
        _cssScale=cssExtra;
        mapEl.style.transformOrigin="center center";
        mapEl.style.transform="scale("+cssExtra.toFixed(2)+")";
        if(cvs){cvs.style.transformOrigin="center center";cvs.style.transform="scale("+cssExtra.toFixed(2)+")";}
      }
    }
  }
  _schedulePvRender();
  ["pz1","pz15","pz2","pz3","pz4","pz5"].forEach(function(id){var e=$(id);if(e)e.classList.remove("on");});
  var bid="pz"+String(z).replace(".","");if($(bid))$(bid).classList.add("on");
  $("zL").textContent=z+"×";
  if(z>1)T("🔍 "+z+"배 확대"+ (_cssScale>1.05?" (그리기 오차 가능)":""));
}
function pgZoomReset(){_baseMapLevel=null;_cssScale=1;}

// CSS scale 보정: 원시 마우스 좌표에서 직접 LatLng 계산
function _correctLatLng(ll,e){
  if(_cssScale<=1.05)return ll;
  if(!e){
    // 원시 이벤트 없으면 수학 보정 폴백
    var ctr=km.getCenter();
    var corrLat=ctr.getLat()+(ll.getLat()-ctr.getLat())/_cssScale;
    var corrLng=ctr.getLng()+(ll.getLng()-ctr.getLng())/_cssScale;
    return new kakao.maps.LatLng(corrLat,corrLng);
  }
  var el=$("kMap");
  var rect=el.getBoundingClientRect();
  var origW=el.offsetWidth, origH=el.offsetHeight;
  var screenCX=rect.left+rect.width/2;
  var screenCY=rect.top+rect.height/2;
  var dx=e.clientX-screenCX;
  var dy=e.clientY-screenCY;
  var mapPxX=dx/_cssScale;
  var mapPxY=dy/_cssScale;
  var bn=km.getBounds(),sw=bn.getSouthWest(),ne=bn.getNorthEast();
  var lngPerPx=(ne.getLng()-sw.getLng())/origW;
  var latPerPx=(ne.getLat()-sw.getLat())/origH;
  var ctr2=km.getCenter();
  var corrLng=ctr2.getLng()+mapPxX*lngPerPx;
  var corrLat=ctr2.getLat()-mapPxY*latPerPx;
  return new kakao.maps.LatLng(corrLat,corrLng);
}
function sn(n,d){var e=$("s"+n);if(e){if(d)e.classList.add("ok");else e.classList.remove("ok");}}
function ec(n,on){var c=$("c"+n);if(c){if(on)c.classList.remove("off");else c.classList.add("off");}}
function hav(a,b){var R=6371000,d1=(b.lat-a.lat)*Math.PI/180,d2=(b.lng-a.lng)*Math.PI/180;var x=Math.sin(d1/2)*Math.sin(d1/2)+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(d2/2)*Math.sin(d2/2);return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}

// Mode
function setMode(m){if(m===curMo)return;if(allPolys.length>0||pts.length>0||mods.length>0){if(!confirm((m==="land"?"토지":"지붕")+" 모드 전환 시 초기화됩니다. 계속?"))return;}
  clrAll();curMo=m;var r=m==="roof";$("mR").className=r?"ar":"";$("mL").className=r?"":"al";$("hI").textContent=r?"🏠":"🌿";$("hT").textContent=r?"지붕 패널 배치":"토지 패널 배치";$("s1L").textContent=r?"지붕 선택":"토지 선택";$("s2L").textContent=r?"영역 그리기":"토지 영역 그리기";$("sA").textContent="주소를 검색하세요";sn(1,false);
  if(r){$("tD").value="15";$("sB").value="0.5";$("rG").value="0.8";}else{$("tD").value="25";$("sB").value="1.5";$("rG").value="1.5";}T(r?"🏠 지붕":"🌿 토지");}

// Init with retry
var _initRetries=0;
function init(){
  if(!window.kakao||!kakao.maps){
    if(_initRetries<3){
      _initRetries++;
      T("지도 SDK 로딩 중... ("+_initRetries+"/3)",3000);
      setTimeout(init,1500);return;
    }
    $("kMap").innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#64748b;flex-direction:column;gap:8px;"><div>카카오 지도 로딩 실패</div><button onclick="location.reload()" style="padding:6px 16px;border-radius:6px;background:#06d6a0;color:#0f172a;border:none;font-weight:700;cursor:pointer;">새로고침</button></div>';return;
  }
  kakao.maps.load(function(){kR=true;
    km=new kakao.maps.Map($("kMap"),{center:new kakao.maps.LatLng(cLa,cLo),level:2,mapTypeId:kakao.maps.MapTypeId.SKYVIEW,disableDoubleClickZoom:true});
    kakao.maps.event.addListener(km,"click",onClick);
    kakao.maps.event.addListener(km,"zoom_changed",function(){$("fZ").textContent="줌:"+km.getLevel();_clearPvCanvas();});
    kakao.maps.event.addListener(km,"center_changed",function(){var c=km.getCenter();$("fC").textContent=c.getLat().toFixed(5)+","+c.getLng().toFixed(5);});
    kakao.maps.event.addListener(km,"idle",_schedulePvRender);
    kakao.maps.event.addListener(km,"dragstart",_clearPvCanvas);
    $("fZ").textContent="줌:"+km.getLevel();
    var q=new URLSearchParams(location.search),la=parseFloat(q.get("lat")),lo=parseFloat(q.get("lng")),ad=q.get("address")||"";
    if(la&&lo&&isFinite(la)&&isFinite(lo)){cLa=la;cLo=lo;$("iLa").value=la;$("iLo").value=lo;if(ad){cAd=ad;$("sA").textContent=ad;$("aS").value=ad;}km.setCenter(new kakao.maps.LatLng(la,lo));km.setLevel(2);pgZoomReset();}
    ["mW","mH","mP","tD","rG","sB"].forEach(function(k){var v=q.get(k);if(v){var e=$(k);if(e)e.value=v;}});
    var um=q.get("mode");if(um==="land")setMode("land");
  });
}

// VWorld JSONP geocoding

function showMeas(){clrMeasOv();
  // 1단계: 모든 라벨 위치 계산
  var labels=[];
  allPolys.forEach(function(ap){
    var p=ap.pts;if(p.length<2)return;
    var cx=0,cy=0;for(var k=0;k<p.length;k++){cx+=p[k].lat;cy+=p[k].lng;}cx/=p.length;cy/=p.length;
    var maxR=0;for(var k=0;k<p.length;k++){var dd=Math.sqrt(Math.pow(p[k].lat-cx,2)+Math.pow(p[k].lng-cy,2));if(dd>maxR)maxR=dd;}
    var offM=Math.max(0.00015,Math.min(0.00040,maxR*0.3));
    for(var i=0;i<p.length;i++){var a=p[i],b=p[(i+1)%p.length];var d=hav(a,b);
      var ml=(a.lat+b.lat)/2,mg=(a.lng+b.lng)/2;
      var ex=b.lat-a.lat,ey=b.lng-a.lng;var nx=-ey,ny=ex;
      var dot=nx*(ml-cx)+ny*(mg-cy);if(dot<0){nx=-nx;ny=-ny;}
      var nlen=Math.sqrt(nx*nx+ny*ny)||1;nx/=nlen;ny/=nlen;
      labels.push({ml:ml,mg:mg,nx:nx,ny:ny,offM:offM,d:d,olat:ml+nx*offM,olng:mg+ny*offM});
    }
  });
  // 2단계: 겹침 방지 — 3회 반복, 가까운 라벨을 법선 방향으로 밀어냄
  var minSep=0.00022; // ~40m 최소 간격
  for(var pass=0;pass<3;pass++){
    for(var i=0;i<labels.length;i++){
      for(var j=0;j<i;j++){
        var dx=labels[i].olat-labels[j].olat,dy=labels[i].olng-labels[j].olng;
        var dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<minSep){
          var push=(minSep-dist)*0.5;
          labels[i].olat+=labels[i].nx*push;
          labels[i].olng+=labels[i].ny*push;
        }
      }
    }
  }
  // 3단계: 렌더링
  labels.forEach(function(lb){
    var edgeOut=lb.offM*0.15;
    var sLat=lb.ml+lb.nx*edgeOut,sLng=lb.mg+lb.ny*edgeOut;
    var ll=new kakao.maps.Polyline({path:[new kakao.maps.LatLng(sLat,sLng),new kakao.maps.LatLng(lb.olat,lb.olng)],strokeWeight:1,strokeColor:"#ff3b3b",strokeOpacity:0.5,strokeStyle:"shortdash"});

    var o=new kakao.maps.CustomOverlay({position:new kakao.maps.LatLng(lb.olat,lb.olng),content:'<div class="ml">'+lb.d.toFixed(1)+'m</div>',yAnchor:0.5,xAnchor:0.5,zIndex:20});
    o.setMap(km);measOvs.push(o);
  });}

// Module layout
function gP(){var g=function(id){return parseFloat($(id).value);};var w=g("mW")||1.13,h=g("mH")||2.4,p=g("mP")||640,t=g("tD")||15,r=g("rG")||0.8,s=g("sB")||0.5,o=$("ori").value,L=o==="landscape";return{mW:L?h:w,mH:L?w:h,mP:p,ti:t,rG:r,sB:s};}

function autoLay(){
  if(!allPolys.length){T("먼저 영역 그리기");return;}clrMod();
  var p=gP(),pH=p.mH*Math.cos(p.ti*Math.PI/180);

  // 모든 폴리곤을 setback 적용하여 turf polygon 배열 생성
  var polys=[];
  allPolys.forEach(function(ap){
    var co=ap.pts.map(function(pt){return[pt.lng,pt.lat];});co.push(co[0]);
    try{var poly=turf.polygon([co]);if(p.sB>0){var s=turf.buffer(poly,-p.sB,{units:"meters"});if(s&&s.geometry)poly=s;}polys.push(poly);}catch(e){}
  });
  if(!polys.length){T("오류");return;}

  // 통합 bbox (모든 폴리곤 통합) — 단일 그리드로 정렬
  var uBbox=[Infinity,Infinity,-Infinity,-Infinity];
  polys.forEach(function(poly){var bb=turf.bbox(poly);
    if(bb[0]<uBbox[0])uBbox[0]=bb[0];if(bb[1]<uBbox[1])uBbox[1]=bb[1];
    if(bb[2]>uBbox[2])uBbox[2]=bb[2];if(bb[3]>uBbox[3])uBbox[3]=bb[3];
  });

  var cl=(uBbox[1]+uBbox[3])/2,mL=111320*Math.cos(cl*Math.PI/180),mA=111000;
  var pW=p.mW/mL,pHd=pH/mA,gL=0.08/mL,gA=p.rG/mA,sL=pW+gL,sA=pHd+gA;
  var cn=0;

  // 통합 그리드에서 각 셀을 모든 폴리곤에 대해 체크
  for(var x=uBbox[0];x<uBbox[2];x+=sL){for(var y=uBbox[1];y<uBbox[3];y+=sA){if(cn>=5000)break;
    var cx2=(x+x+pW)/2,cy2=(y+y+pHd)/2;
    var ins=false;
    for(var pi=0;pi<polys.length;pi++){
      try{
        var pp=turf.bboxPolygon([x,y,x+pW,y+pHd]);
        ins=turf.booleanContains(polys[pi],pp)||turf.booleanWithin(pp,polys[pi]);
      }catch(e){try{ins=turf.booleanPointInPolygon(turf.point([cx2,cy2]),polys[pi]);}catch(e2){}}
      if(ins)break;
    }
    if(ins){mods.push({s:y,n:y+pHd,w:x,e:x+pW});cn++;}
  }}

  renMods();uSt();$("dMR").style.display="flex";$("dMV").textContent=mods.length+"장/"+(mods.length*p.mP/1000).toFixed(1)+"kW";
  sn(3,true);sn(4,true);ec(5,true);T("⚡ "+mods.length+"개 배치 ("+allPolys.length+"영역)");syncOp();
  // 자동 캡쳐 (리포트용 — 배치 완료 1.5초 후)
  setTimeout(function(){if(mods.length)doCapture();},1500);}

function plcMn(ll){var p=gP(),pH=p.mH*Math.cos(p.ti*Math.PI/180),lat=ll.getLat(),lng=ll.getLng(),mL=111320*Math.cos(lat*Math.PI/180),mA=111000;
  var m={s:lat-(pH/2)/mA,n:lat+(pH/2)/mA,w:lng-(p.mW/2)/mL,e:lng+(p.mW/2)/mL};mods.push(m);

// ── Realistic Panel Canvas Overlay ──
var _pvTimer=null;

function _schedulePvRender(){if(_pvTimer)clearTimeout(_pvTimer);_pvTimer=setTimeout(_renderPanels,120);}
function _renderPanels(){
  var c=$("pvCvs");
  if(!c||!mods.length||!km){if(c)_clearPvCanvas();return;}
  var el=$("kMap");
  var dpr=window.devicePixelRatio||1;
  var W=el.offsetWidth,H=el.offsetHeight;
  c.width=W*dpr;c.height=H*dpr;
  c.style.width=W+"px";c.style.height=H+"px";
  var ctx=c.getContext("2d");
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);

  var bn=km.getBounds(),sw=bn.getSouthWest(),ne=bn.getNorthEast();
  var lngS=ne.getLng()-sw.getLng(),latS=ne.getLat()-sw.getLat();
  if(lngS<=0||latS<=0)return;
  function tX(ln){return((ln-sw.getLng())/lngS)*W;}
  function tY(la){return((ne.getLat()-la)/latS)*H;}

  var p=gP(),isLand=(curMo==="land"),tilt=p.ti||0;

  mods.forEach(function(m){
    var x=tX(m.w),y=tY(m.n),w=tX(m.e)-x,h=tY(m.s)-y;
    if(w<1.5||h<1.5)return;

  });
}

function _drawPanel(ctx,x,y,w,h,isLand,tilt){
  if(w<1||h<1)return;
  ctx.save();

  // ── 토지모드: 경사 지지대 + 그림자 ──
  if(isLand&&tilt>0){
    var legH=Math.max(1.5,h*0.16*(tilt/25));
    // 지면 그림자 (부드러운 그라디언트)
    var sg=ctx.createLinearGradient(x,y+h,x,y+h+legH);
    sg.addColorStop(0,"rgba(0,0,0,0.18)");sg.addColorStop(1,"rgba(0,0,0,0)");
    ctx.fillStyle=sg;
    ctx.beginPath();ctx.moveTo(x,y+h);ctx.lineTo(x+w,y+h);
    ctx.lineTo(x+w+legH*0.2,y+h+legH);ctx.lineTo(x,y+h+legH*0.3);
    ctx.closePath();ctx.fill();
    // 지지대 레일 (가로)
    ctx.strokeStyle="rgba(180,190,200,0.5)";
    ctx.lineWidth=Math.max(0.6,w*0.012);
    ctx.beginPath();ctx.moveTo(x,y+h*0.92);ctx.lineTo(x+w,y+h*0.92);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x,y+h*0.08);ctx.lineTo(x+w,y+h*0.08);ctx.stroke();
    // 다리
    var nL=Math.max(2,Math.round(w/20));
    ctx.lineWidth=Math.max(0.5,w*0.01);
    for(var i=0;i<nL;i++){
      var lx=x+w*((i+0.5)/nL);
      ctx.strokeStyle="rgba(170,180,195,0.6)";
      ctx.beginPath();ctx.moveTo(lx,y+h);ctx.lineTo(lx+legH*0.1,y+h+legH);ctx.stroke();
      ctx.beginPath();ctx.moveTo(lx,y);ctx.lineTo(lx-legH*0.03,y+legH*0.25);ctx.stroke();
    }
  }

  // ── 실리콘 셀 (어두운 남색 그라디언트 — 실제 모노결정 색상) ──
  var bg=ctx.createLinearGradient(x,y,x+w*0.3,y+h);
  bg.addColorStop(0,"#101e3a");bg.addColorStop(0.3,"#0c1a35");
  bg.addColorStop(0.6,"#111f3c");bg.addColorStop(1,"#0e1c38");
  ctx.fillStyle=bg;ctx.fillRect(x,y,w,h);

  // ── 셀 분할선 (실제 비율: 세로6×가로10 셀) ──
  var cR=6,cC=Math.max(2,Math.round((w/h)*6));
  if(cC>16)cC=16;
  var cw=w/cC,ch=h/cR;

  // 셀 간 미세 간격 (실버 그리드 — 실제 패널의 셀 간 갭)
  ctx.fillStyle="rgba(120,140,165,0.18)";
  for(var r=1;r<cR;r++)ctx.fillRect(x,y+ch*r-0.3,w,0.6);
  for(var c=1;c<cC;c++)ctx.fillRect(x+cw*c-0.3,y,0.6,h);

  // 각 셀에 미세한 색상 변동 (실리콘 결정 불균일성)
  if(w>6&&h>6){
    for(var r=0;r<cR;r++){for(var c=0;c<cC;c++){
      var seed=((r*31+c*17+Math.round(x*7))&0xFF)/255;
      if(seed>0.6){
        ctx.fillStyle="rgba(20,35,65,"+(0.04+seed*0.06)+")";
        ctx.fillRect(x+cw*c+0.4,y+ch*r+0.4,cw-0.8,ch-0.8);
      }
    }}
  }

  // ── 버스바 (은색 수직 리본 — 실제 패널 3~5줄) ──
  if(w>5){
    var nBus=w>20?5:3;
    ctx.fillStyle="rgba(200,215,230,0.09)";
    var bw=Math.max(0.4,w*0.008);
    for(var b=1;b<nBus;b++){
      ctx.fillRect(x+w*b/nBus-bw/2,y+0.5,bw,h-1);
    }
  }

  // ── 유리 반사 (대각선 하이라이트 — 실사 핵심) ──
  var rg=ctx.createLinearGradient(x,y,x+w*0.45,y+h*0.45);
  rg.addColorStop(0,"rgba(220,240,255,0.10)");
  rg.addColorStop(0.12,"rgba(220,240,255,0.03)");
  rg.addColorStop(0.35,"rgba(0,0,0,0)");
  rg.addColorStop(1,"rgba(0,0,0,0)");
  ctx.fillStyle=rg;ctx.fillRect(x,y,w,h);

  // 하단 가장자리 미세 반사
  var rg2=ctx.createLinearGradient(x,y+h*0.85,x,y+h);
  rg2.addColorStop(0,"rgba(0,0,0,0)");
  rg2.addColorStop(1,"rgba(140,180,220,0.04)");
  ctx.fillStyle=rg2;ctx.fillRect(x,y,w,h);

  // ── 알루미늄 프레임 ──
  ctx.strokeStyle="rgba(160,175,190,0.55)";
  ctx.lineWidth=Math.max(0.6,Math.min(1.8,w*0.02));
  ctx.strokeRect(x+0.2,y+0.2,w-0.4,h-0.4);

  // 프레임 빛 하이라이트 (좌측+상단)
  ctx.strokeStyle="rgba(230,240,250,0.08)";
  ctx.lineWidth=0.4;
  ctx.beginPath();ctx.moveTo(x+0.5,y+h-0.5);ctx.lineTo(x+0.5,y+0.5);ctx.lineTo(x+w-0.5,y+0.5);ctx.stroke();

  ctx.restore();
}

// Capture (Static Map API proxy)
async function doCapture(){if(!mods.length&&!allPolys.length){T("먼저 배치");return;}T("📸 캡쳐...",5000);
  var ctr=km.getCenter(),lv=km.getLevel(),el=$("kMap"),W=el.offsetWidth,H=el.offsetHeight,base=BK||"";
  try{
  var c2=document.createElement("canvas");c2.width=W;c2.height=H;var x2=c2.getContext("2d");

  // 배경: 정적 맵 API 시도 → 실패 시 어두운 배경으로 폴백
  var bgOk=false;
  if(base){
    try{
      var capW=Math.min(W,1024),capH=Math.min(H,1024);
      var iu=base+"/api/map-capture?lat="+ctr.getLat()+"&lng="+ctr.getLng()+"&level="+lv+"&width="+capW+"&height="+capH;
      var img=new Image();img.crossOrigin="anonymous";
      await new Promise(function(ok,ng){var t=setTimeout(function(){ng(new Error("timeout"))},8000);img.onload=function(){clearTimeout(t);ok();};img.onerror=function(){clearTimeout(t);ng(new Error("img fail"));};img.src=iu;});
      x2.drawImage(img,0,0,c2.width,c2.height);bgOk=true;
    }catch(e){console.warn("map capture fallback:",e);}
  }
  if(!bgOk){
    x2.fillStyle="#0f172a";x2.fillRect(0,0,c2.width,c2.height);
    x2.strokeStyle="rgba(100,116,139,0.15)";x2.lineWidth=1;
    for(var gx=0;gx<c2.width;gx+=40){x2.beginPath();x2.moveTo(gx,0);x2.lineTo(gx,c2.height);x2.stroke();}
    for(var gy=0;gy<c2.height;gy+=40){x2.beginPath();x2.moveTo(0,gy);x2.lineTo(c2.width,gy);x2.stroke();}
  }

  var bn=km.getBounds(),sw=bn.getSouthWest(),ne=bn.getNorthEast();

  // 배경 실패 시 → 폴리곤 영역에 맞춰 크롭 (빈 공간 최소화)
  if(!bgOk){
    var minLat=90,maxLat=-90,minLng=180,maxLng=-180;
    allPolys.forEach(function(ap){ap.pts.forEach(function(p){
      if(p.lat<minLat)minLat=p.lat;if(p.lat>maxLat)maxLat=p.lat;
      if(p.lng<minLng)minLng=p.lng;if(p.lng>maxLng)maxLng=p.lng;
    });});
    mods.forEach(function(m){
      if(m.s<minLat)minLat=m.s;if(m.n>maxLat)maxLat=m.n;
      if(m.w<minLng)minLng=m.w;if(m.e>maxLng)maxLng=m.e;
    });
    // 40% 패딩
    var padLat=(maxLat-minLat)*0.4||0.0005,padLng=(maxLng-minLng)*0.4||0.0005;
    sw={getLng:function(){return minLng-padLng;},getLat:function(){return minLat-padLat;}};
    ne={getLng:function(){return maxLng+padLng;},getLat:function(){return maxLat+padLat;}};
  }

  var bW=ne.getLng()-sw.getLng(),bH=ne.getLat()-sw.getLat();
  function tX(ln){return((ln-sw.getLng())/bW)*c2.width;}function tY(la){return((ne.getLat()-la)/bH)*c2.height;}

  // 폴리곤
  allPolys.forEach(function(ap){var pp=ap.pts;if(pp.length>=3){x2.beginPath();x2.moveTo(tX(pp[0].lng),tY(pp[0].lat));for(var i=1;i<pp.length;i++)x2.lineTo(tX(pp[i].lng),tY(pp[i].lat));x2.closePath();x2.strokeStyle="rgba(6,214,160,0.9)";x2.lineWidth=4;x2.stroke();x2.fillStyle="rgba(6,214,160,0.08)";x2.fill();}});

  // 패널
  var cp=gP(),isLandCap=(curMo==="land"),tiltCap=cp.ti||0;
  mods.forEach(function(m){var x=tX(m.w),y=tY(m.n),w=tX(m.e)-x,h=tY(m.s)-y;
    x2.fillStyle="#0f1d3a";x2.fillRect(x,y,w,h);
    _drawPanel(x2,x,y,w,h,isLandCap,tiltCap);
  });

  // 수치 라벨 (빨간 볼드) — 캔버스 크기에 비례
  var labelFontSize=Math.max(11,Math.min(16,c2.width/80));
  allPolys.forEach(function(ap){var pp=ap.pts;if(pp.length<2)return;
    var cx=0,cy=0;for(var k=0;k<pp.length;k++){cx+=pp[k].lat;cy+=pp[k].lng;}cx/=pp.length;cy/=pp.length;
    var maxR=0;for(var k=0;k<pp.length;k++){var dd=Math.sqrt(Math.pow(pp[k].lat-cx,2)+Math.pow(pp[k].lng-cy,2));if(dd>maxR)maxR=dd;}
    var offM=Math.max(0.00015,Math.min(0.00040,maxR*0.3));
    for(var i=0;i<pp.length;i++){var a=pp[i],b=pp[(i+1)%pp.length];var d=hav(a,b);
      var ml=(a.lat+b.lat)/2,mg=(a.lng+b.lng)/2;
      var ex=b.lat-a.lat,ey=b.lng-a.lng;var nx=-ey,ny=ex;
      var dot=nx*(ml-cx)+ny*(mg-cy);if(dot<0){nx=-nx;ny=-ny;}
      var nlen=Math.sqrt(nx*nx+ny*ny)||1;nx/=nlen;ny/=nlen;
      var olat=ml+nx*offM,olng=mg+ny*offM;
      // 라인: 폴리곤 외곽에서 시작 (내부 가로지름 방지)
      var edgeOut=offM*0.15;
      var startLat=ml+nx*edgeOut,startLng=mg+ny*edgeOut;
      x2.setLineDash([4,3]);x2.strokeStyle="rgba(255,59,59,0.5)";x2.lineWidth=1;
      x2.beginPath();x2.moveTo(tX(startLng),tY(startLat));x2.lineTo(tX(olng),tY(olat));x2.stroke();
      x2.setLineDash([]);
      var lx=tX(olng),ly=tY(olat),txt=d.toFixed(1)+"m";
      x2.font="bold "+labelFontSize+"px sans-serif";var tw=x2.measureText(txt).width;
      x2.fillStyle="rgba(0,0,0,0.85)";x2.beginPath();
      var pad=5,bw=tw+pad*2,bh=labelFontSize+6;
      x2.rect(lx-bw/2,ly-bh/2,bw,bh);x2.fill();
      x2.strokeStyle="rgba(255,59,59,0.6)";x2.lineWidth=1;
      x2.strokeRect(lx-bw/2,ly-bh/2,bw,bh);
      x2.fillStyle="#ff3b3b";x2.textAlign="center";x2.textBaseline="middle";
      x2.fillText(txt,lx,ly);
    }
  });

  // 정보 오버레이
  var p=gP(),kw=(mods.length*p.mP/1000).toFixed(1);
  x2.fillStyle="rgba(0,0,0,0.7)";x2.fillRect(c2.width-400,10,390,80);
  x2.font="bold 22px sans-serif";x2.fillStyle="#06d6a0";x2.textAlign="left";x2.textBaseline="alphabetic";
  x2.fillText((curMo==="land"?"🌿":"🏠")+" "+mods.length+"장 | "+kw+"kW",c2.width-390,38);
  x2.font="16px sans-serif";x2.fillStyle="#e2e8f0";
  x2.fillText("면적:"+rA.toFixed(0)+"m² | "+(cAd||""),c2.width-390,62);
  var du=c2.toDataURL("image/jpeg",0.75);
  var allPtsFlat=[];allPolys.forEach(function(ap){allPtsFlat=allPtsFlat.concat(ap.pts);});
  var pl={image:du,address:cAd,lat:cLa,lng:cLo,panelCount:mods.length,capacityKw:parseFloat(kw),roofAreaM2:rA,polyPoints:allPtsFlat,polyCount:allPolys.length};
  try{sessionStorage.setItem("roofPanelCapture",du);}catch(e){}
  try{if(window.opener&&window.opener.receiveRoofPanelCapture){window.opener.receiveRoofPanelCapture(pl);T("✅ 리포트 전달");sn(5,true);}else T("✅ 캡쳐 완료"+(bgOk?"":" (배경 없음)"));}catch(e){T("✅ 캡쳐 완료");}
  try{if(base)fetch(base+"/api/roof-layout/capture",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(pl)}).catch(function(){});}catch(e){}
  $("capS").style.display="block";$("capS").textContent="완료:"+mods.length+"모듈,"+kw+"kW";
  }catch(e){console.error(e);T("캡쳐실패:"+e.message,4000);}}

// Sync
function syncOp(){if(!mods.length||!window.opener)return;try{var p=gP(),kw=mods.length*p.mP/1000;
  if(window.opener.currentAnalysisData){window.opener.currentAnalysisData.roofPanelCount=mods.length;window.opener.currentAnalysisData.roofCapacityKw=kw;window.opener.currentAnalysisData.roofAreaM2=rA;}
  if(window.opener._roofPanelCaptureData){window.opener._roofPanelCaptureData.panelCount=mods.length;window.opener._roofPanelCaptureData.capacityKw=kw;}
  var base=BK||"";if(base)try{fetch(base+"/api/roof-layout/capture",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({address:cAd,lat:cLa,lng:cLo,panelCount:mods.length,capacityKw:kw,roofAreaM2:rA})}).catch(function(){});}catch(e){}
  }catch(e){}}
window.addEventListener("beforeunload",syncOp);
document.addEventListener("keydown",function(e){if(e.key==="Escape"){if(dM)togDr();if(mM)togMn();}if(e.key==="Enter"&&dM&&pts.length>=3)finPoly();if(e.ctrlKey&&e.key==="z"&&dM)undo();});
window.addEventListener("DOMContentLoaded",init);
</script>
